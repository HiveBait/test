# Dependency Review Action
#
# This Action will scan dependency manifest files that change as part of a Pull Request,
# surfacing known-vulnerable versions of the packages declared or updated in the PR.
# Once installed, if the workflow run is marked as required, PRs introducing known-vulnerable
# packages will be blocked from merging.
#
# Source repository: https://github.com/actions/dependency-review-action
# Public documentation: https://docs.github.com/en/code-security/supply-chain-security/understanding-your-software-supply-chain/about-dependency-review#dependency-review-enforcement
name: 'Dependency Review'

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write  # Required for comment-summary-in-pr option

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: 'Dependency Review'
        uses: actions/dependency-review-action@v4
        with:
          # Post summary comment on PR
          comment-summary-in-pr: always

          # Fail on high severity vulnerabilities (critical/high CVEs)
          fail-on-severity: high

          # Additional recommended options (uncomment to enable):
          # fail-on-severity: moderate  # Stricter: also fail on moderate severity
          # deny-licenses: GPL-1.0-or-later, LGPL-2.0-or-later  # Block copyleft licenses
          # retry-on-snapshot-warnings: true  # Retry if dependency graph not ready
